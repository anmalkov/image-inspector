name: Nightly vulnerability scan

on:
  schedule:
    # 02:00 UTC every day
    - cron: "0 2 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: nightly-scan
  cancel-in-progress: false

jobs:
  scan:
    name: Scan ${{ matrix.language }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language:
          - python
          - dotnet
          - java
          - go
          - node
          - rust
          - cpp
          - ubuntu
          - debian
          - alpine
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.13"

      - name: Sync dependencies
        run: uv sync

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1
        with:
          version: v0.71.1

      - name: Scan ${{ matrix.language }}
        run: uv run image-inspector-scan -l ${{ matrix.language }} -o report-${{ matrix.language }}.json

      - name: Upload partial report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: report-${{ matrix.language }}
          path: report-${{ matrix.language }}.json
          retention-days: 1

  combine:
    name: Combine and commit
    needs: scan
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.13"

      - name: Sync dependencies
        run: uv sync

      - name: Download partial reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: reports
          pattern: report-*
          merge-multiple: true

      - name: Merge into a single report
        run: uv run image-inspector-merge reports/*.json -o src/image_inspector/data/report.json

      - name: Commit updated report
        run: |
          if [[ -n "$(git status --porcelain src/image_inspector/data/report.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/image_inspector/data/report.json
            git commit -m "chore: update nightly vulnerability report"
            git push
          else
            echo "Report unchanged; nothing to commit."
          fi
