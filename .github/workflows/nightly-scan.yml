name: Nightly vulnerability scan

on:
  schedule:
    # 02:00 UTC every day
    - cron: "0 2 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: nightly-scan
  cancel-in-progress: false

jobs:
  scan:
    name: Scan ${{ matrix.language }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language:
          - python
          - dotnet
          - java
          - go
          - node
          - rust
          - cpp
          - ubuntu
          - debian
          - alpine
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.13"

      - name: Sync dependencies
        run: uv sync

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1
        with:
          version: v0.71.1

      - name: Scan ${{ matrix.language }}
        run: >
          uv run image-inspector-scan
          -l ${{ matrix.language }}
          -o report-${{ matrix.language }}.json
          --prior-url https://anmalkov.github.io/image-inspector/report.json.gz
          --sbom-base-url https://anmalkov.github.io/image-inspector
          --sbom-out-dir sboms

      - name: Upload partial report and SBOMs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: partial-${{ matrix.language }}
          path: |
            report-${{ matrix.language }}.json
            sboms/
          retention-days: 1
          if-no-files-found: ignore

  combine:
    name: Combine and publish to Pages
    needs: scan
    runs-on: ubuntu-latest
    permissions:
      contents: read    # actions/checkout
      pages: write      # deploy to GitHub Pages
      id-token: write   # OIDC token for deploy-pages
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.13"

      - name: Sync dependencies
        run: uv sync

      - name: Download partial reports and SBOMs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: reports
          pattern: partial-*
          merge-multiple: true

      - name: Assemble the Pages site
        run: |
          mkdir -p pages-dir
          uv run image-inspector-merge reports/report-*.json \
            --prior-url https://anmalkov.github.io/image-inspector/report.json.gz \
            --sbom-src-dir reports/sboms \
            --sbom-out-dir pages-dir/sbom \
            -o pages-dir/report.json \
            --gzip-output pages-dir/report.json.gz

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: pages-dir

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
