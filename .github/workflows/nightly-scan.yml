name: Nightly vulnerability scan

on:
  schedule:
    # 02:00 UTC every day
    - cron: "0 2 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: nightly-scan
  cancel-in-progress: false

jobs:
  scan:
    name: Scan ${{ matrix.language }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language:
          - python
          - dotnet
          - java
          - go
          - node
          - rust
          - cpp
          - ubuntu
          - debian
          - alpine
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Sync dependencies
        run: uv sync

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.3.1
        with:
          version: v0.71.1

      - name: Scan ${{ matrix.language }}
        run: uv run image-inspector-scan -l ${{ matrix.language }} -o report-${{ matrix.language }}.json

      - name: Upload partial report
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.language }}
          path: report-${{ matrix.language }}.json
          retention-days: 1

  combine:
    name: Combine and commit
    needs: scan
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Sync dependencies
        run: uv sync

      - name: Download partial reports
        uses: actions/download-artifact@v4
        with:
          path: reports
          pattern: report-*
          merge-multiple: true

      - name: Merge into a single report
        run: uv run image-inspector-merge reports/*.json -o src/image_inspector/data/report.json

      - name: Commit updated report
        run: |
          if [[ -n "$(git status --porcelain src/image_inspector/data/report.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/image_inspector/data/report.json
            git commit -m "chore: update nightly vulnerability report"
            git push
          else
            echo "Report unchanged; nothing to commit."
          fi
