name: Nightly vulnerability scan

on:
  schedule:
    # 02:00 UTC every day
    - cron: "0 2 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: nightly-scan
  cancel-in-progress: false

jobs:
  scan:
    name: Scan ${{ matrix.language }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language:
          - python
          - dotnet
          - java
          - go
          - node
          - rust
          - cpp
          - ubuntu
          - debian
          - alpine
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          python-version: "3.13"

      - name: Sync dependencies
        run: uv sync

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1
        with:
          version: v0.71.1

      - name: Scan ${{ matrix.language }}
        run: uv run image-inspector-scan -l ${{ matrix.language }} -o report-${{ matrix.language }}.json

      - name: Upload partial report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: report-${{ matrix.language }}
          path: report-${{ matrix.language }}.json
          retention-days: 1

  combine:
    name: Combine and commit
    needs: scan
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          python-version: "3.13"

      - name: Sync dependencies
        run: uv sync

      - name: Download partial reports
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: reports
          pattern: report-*
          merge-multiple: true

      - name: Merge into a single report
        run: uv run image-inspector-merge reports/*.json -o src/image_inspector/data/report.json

      - name: Commit updated report
        run: |
          if [[ -n "$(git status --porcelain src/image_inspector/data/report.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/image_inspector/data/report.json
            git commit -m "chore: update nightly vulnerability report"
            git push
          else
            echo "Report unchanged; nothing to commit."
          fi
