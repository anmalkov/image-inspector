name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, publish and release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release
      id-token: write   # PyPI Trusted Publishing (OIDC)
    environment:
      name: pypi
      url: https://pypi.org/project/base-image-inspector/
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Ensure tag is on main
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tag ${GITHUB_REF_NAME} is not on main; refusing to release."
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.13"

      - name: Derive version from tag
        id: version
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Releasing version ${version}"

      - name: Set project version
        run: uv version "${{ steps.version.outputs.version }}"

      - name: Snapshot the latest Pages report into the package
        # Pin a release-time offline snapshot into the wheel so the package ships a
        # bundled fallback for end users who run offline. The report is NOT committed to
        # the repo (the nightly job publishes it to Pages); it is fetched here at release
        # time. This is a HARD requirement: if the report can't be downloaded or isn't
        # parseable JSON, the release fails rather than shipping a stale or empty copy.
        run: |
          url="https://anmalkov.github.io/image-inspector/report.json"
          tmp="$(mktemp)"
          dest="src/image_inspector/data/report.json.gz"
          mkdir -p "$(dirname "$dest")"
          curl --fail --silent --show-error --location --max-time 30 "$url" -o "$tmp"
          python3 -c "import json,sys; json.load(open(sys.argv[1]))" "$tmp"
          gzip --no-name --stdout "$tmp" > "$dest"
          rm -f "$tmp"
          echo "Snapshotted the latest report from Pages into ${dest}."

      - name: Snapshot the latest Pages details sidecar into the package
        # Bundle the lazy critical/high details sidecar so the --dockerfile fix-diff works
        # offline. Same hard requirement as the counts report: a missing/unparseable sidecar
        # fails the release rather than shipping a stale or empty fallback.
        run: |
          url="https://anmalkov.github.io/image-inspector/details.json"
          tmp="$(mktemp)"
          dest="src/image_inspector/data/details.json.gz"
          mkdir -p "$(dirname "$dest")"
          curl --fail --silent --show-error --location --max-time 30 "$url" -o "$tmp"
          python3 -c "import json,sys; json.load(open(sys.argv[1]))" "$tmp"
          gzip --no-name --stdout "$tmp" > "$dest"
          rm -f "$tmp"
          echo "Snapshotted the latest details sidecar from Pages into ${dest}."

      - name: Verify the tool accepts the bundled report
        # Release gate: run the integration test (deselected from the default unit run)
        # that loads the freshly snapshotted report through the tool itself. The
        # definition of "valid" lives entirely in image_inspector, so this never needs
        # updating when the report format or schema version changes.
        run: uv run pytest -m integration

      - name: Build distributions
        run: uv build

      - name: Smoke-test the built wheel
        # The bundled report.json is git-ignored/untracked, so verify the *published*
        # wheel actually contains it: install the built wheel into a throwaway venv
        # (isolated from the source tree) and load the report offline. Fails the release
        # if the artifact ships without a usable offline fallback.
        run: |
          uv venv --python 3.13 /tmp/smoke
          uv pip install --python /tmp/smoke/bin/python --quiet dist/*.whl
          IMAGE_INSPECTOR_OFFLINE=1 /tmp/smoke/bin/python -c "
          import sys
          from image_inspector.report import load_report, load_details, ReportSource
          report = load_report()
          if report.source is not ReportSource.OFFLINE or not report.images:
              sys.exit('Built wheel does not ship a usable offline report (source=%r, images=%d); refusing to release.' % (report.source, len(report.images)))
          details = load_details()
          if not details.digests:
              sys.exit('Built wheel does not ship a usable offline details sidecar (%d digests); refusing to release.' % len(details.digests))
          print('Built wheel ships a usable offline report: %d image(s), %d detail digest(s).' % (len(report.images), len(details.digests)))
          "

      - name: Publish to PyPI
        run: uv publish

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/*

      - name: Append community callout to release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          body="$(gh release view "${GITHUB_REF_NAME}" --json body --jq .body)"
          footer=$'\n\n---\n\n## 💬 Join the community\n\nQuestions, feedback, or ideas? Come chat with us on [Discord](https://discord.gg/vnAh9Cqyw).'
          gh release edit "${GITHUB_REF_NAME}" --notes "${body}${footer}"
