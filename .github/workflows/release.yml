name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, publish and release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release
      id-token: write   # PyPI Trusted Publishing (OIDC)
    environment:
      name: pypi
      url: https://pypi.org/project/base-image-inspector/
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Ensure tag is on main
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tag ${GITHUB_REF_NAME} is not on main; refusing to release."
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.13"

      - name: Derive version from tag
        id: version
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Releasing version ${version}"

      - name: Set project version
        run: uv version "${{ steps.version.outputs.version }}"

      - name: Snapshot the latest Pages report into the package
        # Pin a release-time offline snapshot into the wheel so the bundled fallback is
        # fresh. The nightly job publishes to Pages instead of committing the report, so
        # we refresh the bundled copy here. The schema_version check below mirrors
        # SCHEMA_VERSION in src/image_inspector/report.py so we never bundle an
        # incompatible report. Fail soft: ship the committed copy if the fetch fails or
        # returns something that isn't a valid, supported report.
        run: |
          url="https://anmalkov.github.io/image-inspector/report.json"
          dest="src/image_inspector/data/report.json"
          tmp="$(mktemp)"
          if curl --fail --silent --show-error --location --max-time 30 "$url" -o "$tmp" \
            && python3 -c "import json,sys; d=json.load(open(sys.argv[1])); assert isinstance(d, dict) and d.get('schema_version') == 2 and isinstance(d.get('images'), dict)" "$tmp"; then
            count="$(python3 -c "import json,sys; print(len(json.load(open(sys.argv[1]))['images']))" "$tmp")"
            mv "$tmp" "$dest"
            echo "Snapshotted ${count} image(s) from Pages into ${dest}."
          else
            echo "::warning::Could not fetch a valid report from ${url}; shipping the committed copy at ${dest}."
            rm -f "$tmp"
          fi

      - name: Build distributions
        run: uv build

      - name: Publish to PyPI
        run: uv publish

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/*

      - name: Append community callout to release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          body="$(gh release view "${GITHUB_REF_NAME}" --json body --jq .body)"
          footer=$'\n\n---\n\n## 💬 Join the community\n\nQuestions, feedback, or ideas? Come chat with us on [Discord](https://discord.gg/vnAh9Cqyw).'
          gh release edit "${GITHUB_REF_NAME}" --notes "${body}${footer}"
